<div class="modal fade" id="createProfileModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Новый геопрофиль</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Название профиля</label>
          <input id="profile-name" class="form-control" placeholder="Например, Дом">
        </div>

        <div id="profile-map" style="height: 400px;"></div>
        <div class="text-muted mt-2">
          Кликните по карте, чтобы выбрать точку
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
        <button id="btn-save-profile" class="btn btn-primary">Сохранить</button>
      </div>

    </div>
  </div>
</div>
