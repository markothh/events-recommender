{% extends "base.html" %}
{% block content %}
<div class="container mt-4 mb-4" id="event-root">

  <h2 id="ev-title" class="mb-2">Загрузка...</h2>

  <div class="text-muted mb-3">
    <i class="bi bi-geo-alt"></i>
    <span id="ev-place"></span>
  </div>

  <div class="row">
    <!-- Карусель -->
    <div class="col-md-6">
      <div id="ev-carousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner" id="ev-images"></div>
        <button class="carousel-control-prev" type="button" data-bs-target="#ev-carousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#ev-carousel" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
    </div>

    <!-- Описание -->
    <div class="col-md-6">
      <div id="ev-desc"></div>
    </div>

    <div id="ev-tags" class="mt-3"></div>
  </div>

  <!-- Даты -->
  <div class="mt-4">
    <h5>Даты проведения</h5>
    <ul id="ev-dates"></ul>
  </div>

  <!-- Карта -->
  <div id="ev-map" class="mt-4" style="height:400px; width:100%;"></div>

  <div class="mt-4">
    <button id="btn-track" class="btn btn-outline-primary">
      Отслеживать
    </button>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
const EVENT_ID = {{ event_id }};
const YANDEX_API_KEY = "{{ yandex_api_key }}";
</script>
<script src="https://api-maps.yandex.ru/2.1/?apikey={{ yandex_api_key }}&lang=ru_RU"></script>
<script src="{{ url_for('static', filename='js/event.js') }}"></script>
{% endblock %}
