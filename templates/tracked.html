{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
  <h3>Отслеживаемые события</h3>

  <ul class="nav nav-tabs mt-3" id="trackedTabs">
    <li class="nav-item">
      <a class="nav-link active" data-bs-toggle="tab" href="#actual">Актуальное</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" data-bs-toggle="tab" href="#archive">Архив</a>
    </li>
  </ul>

  <div class="tab-content mt-3">
    <div class="tab-pane fade show active" id="actual">
      <div class="row g-3" id="actual-cards"></div>
    </div>
    <div class="tab-pane fade" id="archive">
      <div class="row g-3" id="archive-cards"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/tracked.js') }}"></script>
{% endblock %}
