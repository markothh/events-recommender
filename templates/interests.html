{% extends "base.html" %}
{% block content %}
<h3>Выберите интересы</h3>
<p>Нажмите на плитки, чтобы выбрать. Сохраните изменения.</p>

<div id="tags-container" class="mb-3 d-flex flex-wrap gap-2"></div>

<button id="save-interests" class="btn btn-primary">
  Сохранить
</button>

{% endblock %}

{% block scripts %}
<style>
  .tag-tile {
    cursor: pointer;
    border: 1px solid #ced4da;
    background-color: #ffffff;
    color: #212529;
    user-select: none;
    transition: all 0.15s ease-in-out;
  }

  .tag-tile:hover {
    background-color: #f8f9fa;
  }

  .tag-selected {
    background-color: #0d6efd;
    color: #ffffff;
    border-color: #0d6efd;
  }
</style>

<script src="{{ url_for('static', filename='js/interests.js') }}"></script>
{% endblock %}
